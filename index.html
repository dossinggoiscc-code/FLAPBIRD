<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Flap and Win with SCC!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
            --scc-blue: #2563eb;
            --scc-orange: #f97316;
            --scc-yellow: #eab308;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Screen Wrapper Management */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            max-width: 500px; /* Emulating premium mobile arcade cabinet ratio */
            max-height: 850px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* --- LANDING SCREEN --- */
        #landing-screen {
            padding: 1.5rem 1.25rem;
            overflow-y: auto;
            justify-content: flex-start;
            align-items: center;
            scrollbar-width: none;
        }
        #landing-screen::-webkit-scrollbar { display: none; }

        /* Animated Hero Title */
        .hero-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            background: linear-gradient(45deg, #38bdf8, var(--scc-yellow), var(--scc-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite, pulseGlow 2s alternate infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 1.25rem;
            padding: 0 0.5rem;
            line-height: 1.4;
        }

        /* Glassmorphism
